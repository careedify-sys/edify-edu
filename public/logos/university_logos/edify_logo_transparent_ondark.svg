<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 70" width="280" height="70">
  <!-- No background - transparent -->
  <!-- Magnifying glass circle -->
  <circle cx="34" cy="28" r="16" fill="none" stroke="#D4A843" stroke-width="3" stroke-linecap="round"/>
  <!-- Handle -->
  <line x1="45.3" y1="39.3" x2="56" y2="50" stroke="#D4A843" stroke-width="3" stroke-linecap="round"/>
  <!-- List lines inside lens -->
  <line x1="26" y1="23" x2="42" y2="23" stroke="#D4A843" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="26" y1="28" x2="40" y2="28" stroke="#D4A843" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="26" y1="33" x2="42" y2="33" stroke="#D4A843" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="68" y="36" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">edify</text>
  <!-- Sub label -->
  <text x="70" y="52" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="400" fill="#D4A843" letter-spacing="2">EDUCATION</text>
</svg>
