<text x="454" y="319.5" class="td" fill="#444444">institutes</text>
<line x1="679" y1="282" x2="679" y2="330" stroke="#C8DDD0" stroke-width="1"/>
<text x="693" y="301.5" class="td" fill="#444444">General management, consulting,</text>
<text x="693" y="319.5" class="td" fill="#444444">marketing, finance</text>
