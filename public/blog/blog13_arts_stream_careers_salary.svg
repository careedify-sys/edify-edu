<text x="454" y="375.5" class="td" fill="#444444">pays at senior levels)</text>
<line x1="679" y1="338" x2="679" y2="386" stroke="#C8DDD0" stroke-width="1"/>
<text x="693" y="357.5" class="td" fill="#444444">Changing fast — digital journalism</text>
<text x="693" y="375.5" class="td" fill="#444444">growing, print shrinking</text>
