<svg viewBox="0 0 660 420" xmlns="http://www.w3.org/2000/svg" width="660" height="420" role="img" aria-label="Distance MBA Chennai universities comparison 2026: Anna University, Madras University, SRM, Annamalai, Bharath Institute fees and accreditation">
  <defs>
    <linearGradient id="cn-navy" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <style>
      .h { font: 700 18px system-ui, -apple-system, Segoe UI, Roboto, sans-serif; fill: #ffffff; }
      .sub { font: 400 12px system-ui, sans-serif; fill: #cbd5e1; }
      .uni { font: 700 13px system-ui, sans-serif; fill: #0f172a; }
      .fee { font: 700 14px system-ui, sans-serif; fill: #f97316; }
      .meta { font: 500 11px system-ui, sans-serif; fill: #475569; }
      .badge { font: 700 10px system-ui, sans-serif; fill: #ffffff; }
      .hdr { font: 700 11px system-ui, sans-serif; fill: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
  </defs>
  <rect width="660" height="420" fill="#f8fafc"/>
  <rect width="660" height="74" fill="url(#cn-navy)"/>
  <text x="24" y="32" class="h">Distance MBA Chennai 2026: Top 5 Universities</text>
  <text x="24" y="54" class="sub">Annual fee, accreditation and UGC-DEB approval status. Verify at official portal.</text>

  <!-- column headers -->
  <text x="24" y="100" class="hdr">University</text>
  <text x="280" y="100" class="hdr">Annual Fee</text>
  <text x="400" y="100" class="hdr">Accreditation</text>
  <text x="550" y="100" class="hdr">UGC-DEB</text>

  <!-- row 1: Anna University -->
  <rect x="20" y="112" width="620" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="32" y="135" class="uni">Anna University</text>
  <text x="32" y="151" class="meta">Centre for Distance Education</text>
  <text x="280" y="143" class="fee">Rs 32,500</text>
  <text x="400" y="143" class="meta">NAAC A++ / NIRF Mgmt 14</text>
  <rect x="544" y="128" width="64" height="22" rx="11" fill="#10b981"/>
  <text x="576" y="143" text-anchor="middle" class="badge">YES</text>

  <!-- row 2: Madras University -->
  <rect x="20" y="170" width="620" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="32" y="193" class="uni">University of Madras</text>
  <text x="32" y="209" class="meta">Institute of Distance Education</text>
  <text x="280" y="201" class="fee">Rs 18,400</text>
  <text x="400" y="201" class="meta">NAAC A++ / State University</text>
  <rect x="544" y="186" width="64" height="22" rx="11" fill="#10b981"/>
  <text x="576" y="201" text-anchor="middle" class="badge">YES</text>

  <!-- row 3: Annamalai University -->
  <rect x="20" y="228" width="620" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="32" y="251" class="uni">Annamalai University</text>
  <text x="32" y="267" class="meta">Directorate of Distance Education</text>
  <text x="280" y="259" class="fee">Rs 22,260</text>
  <text x="400" y="259" class="meta">NAAC A+ / State University</text>
  <rect x="544" y="244" width="64" height="22" rx="11" fill="#10b981"/>
  <text x="576" y="259" text-anchor="middle" class="badge">YES</text>

  <!-- row 4: Alagappa University -->
  <rect x="20" y="286" width="620" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="32" y="309" class="uni">Alagappa University</text>
  <text x="32" y="325" class="meta">Directorate of Distance Education</text>
  <text x="280" y="317" class="fee">Rs 12,500</text>
  <text x="400" y="317" class="meta">NAAC A+ / Karaikudi TN</text>
  <rect x="544" y="302" width="64" height="22" rx="11" fill="#10b981"/>
  <text x="576" y="317" text-anchor="middle" class="badge">YES</text>

  <!-- row 5: SRM University Online (online MBA, comparable price) -->
  <rect x="20" y="344" width="620" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="32" y="367" class="uni">SRM University Online</text>
  <text x="32" y="383" class="meta">Online MBA, OL programmes</text>
  <text x="280" y="375" class="fee">Rs 90,000</text>
  <text x="400" y="375" class="meta">NAAC A+ / Private University</text>
  <rect x="544" y="360" width="64" height="22" rx="11" fill="#10b981"/>
  <text x="576" y="375" text-anchor="middle" class="badge">YES</text>
</svg>
