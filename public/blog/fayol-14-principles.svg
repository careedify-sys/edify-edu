<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1D35"/>
      <stop offset="100%" style="stop-color:#0f2a4a"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="6" fill="#D4922A"/>
  <rect x="80" y="160" width="4" height="180" fill="#D4922A" opacity="0.8"/>
  <text x="104" y="190" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#D4922A" letter-spacing="3">MANAGEMENT</text>
  <text x="104" y="260" font-family="'Segoe UI', Arial, sans-serif" font-size="66" font-weight="800" fill="#FFFFFF">Fayol's 14</text>
  <text x="104" y="340" font-family="'Segoe UI', Arial, sans-serif" font-size="66" font-weight="800" fill="#FFFFFF">Principles</text>
  <text x="104" y="400" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="400" fill="#a0b8d0">of Management</text>
  <!-- Org chart icon -->
  <!-- Top box -->
  <rect x="840" y="180" width="120" height="60" rx="6" fill="#D4922A" opacity="0.9"/>
  <line x1="900" y1="240" x2="900" y2="275" stroke="#D4922A" stroke-width="3"/>
  <!-- Mid horizontal line -->
  <line x1="760" y1="275" x2="1040" y2="275" stroke="#D4922A" stroke-width="3"/>
  <!-- Left branch -->
  <line x1="760" y1="275" x2="760" y2="310" stroke="#D4922A" stroke-width="3"/>
  <rect x="700" y="310" width="120" height="55" rx="6" fill="#1e3a5f" stroke="#D4922A" stroke-width="2"/>
  <!-- Center branch -->
  <line x1="900" y1="275" x2="900" y2="310" stroke="#D4922A" stroke-width="3"/>
  <rect x="840" y="310" width="120" height="55" rx="6" fill="#1e3a5f" stroke="#D4922A" stroke-width="2"/>
  <!-- Right branch -->
  <line x1="1040" y1="275" x2="1040" y2="310" stroke="#D4922A" stroke-width="3"/>
  <rect x="980" y="310" width="120" height="55" rx="6" fill="#1e3a5f" stroke="#D4922A" stroke-width="2"/>
  <!-- Third level from left box -->
  <line x1="760" y1="365" x2="760" y2="395" stroke="#D4922A" stroke-width="2" opacity="0.6"/>
  <line x1="720" y1="395" x2="800" y2="395" stroke="#D4922A" stroke-width="2" opacity="0.6"/>
  <line x1="720" y1="395" x2="720" y2="415" stroke="#D4922A" stroke-width="2" opacity="0.6"/>
  <line x1="800" y1="395" x2="800" y2="415" stroke="#D4922A" stroke-width="2" opacity="0.6"/>
  <rect x="685" y="415" width="70" height="40" rx="4" fill="#0f2a4a" stroke="#D4922A" stroke-width="1.5" opacity="0.7"/>
  <rect x="765" y="415" width="70" height="40" rx="4" fill="#0f2a4a" stroke="#D4922A" stroke-width="1.5" opacity="0.7"/>
  <!-- Third level from center box -->
  <line x1="900" y1="365" x2="900" y2="415" stroke="#D4922A" stroke-width="2" opacity="0.6"/>
  <rect x="865" y="415" width="70" height="40" rx="4" fill="#0f2a4a" stroke="#D4922A" stroke-width="1.5" opacity="0.7"/>
  <!-- Decorative ring -->
  <circle cx="900" cy="370" r="220" fill="none" stroke="#D4922A" stroke-width="0.5" opacity="0.08"/>
  <text x="600" y="610" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#4a6a8a" text-anchor="middle" letter-spacing="2">edifyedu.in</text>
</svg>