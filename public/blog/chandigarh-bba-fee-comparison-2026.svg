<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="720" height="340" role="img" aria-label="Tier 2 Online BBA net programme fee comparison 2026">
  <title>Tier 2 Online BBA: Net Programme Fee Comparison 2026</title>
  <rect width="720" height="340" fill="#f1f5f9" rx="10"/>
  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#0f172a">Tier 2 Online BBA: Net Programme Fee 2026</text>
  <text x="360" y="56" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748b">All UGC-DEB approved · NAAC A+ · Fees indicative · Verify before paying</text>

  <!-- Grid lines (scale 80k to 200k, width 480px from x=190 to x=670) -->
  <line x1="190" y1="75" x2="190" y2="295" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="310" y1="75" x2="310" y2="295" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="430" y1="75" x2="430" y2="295" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="550" y1="75" x2="550" y2="295" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="670" y1="75" x2="670" y2="295" stroke="#e2e8f0" stroke-width="1"/>

  <!-- X-axis labels -->
  <text x="190" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">₹80k</text>
  <text x="310" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">₹1.0L</text>
  <text x="430" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">₹1.2L</text>
  <text x="550" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">₹1.6L</text>
  <text x="670" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">₹2.0L</text>

  <!-- Row 1: LPU ₹1,22,400 → (122400-80000)/120000*480 = 169.6 -->
  <rect x="0" y="82" width="185" height="42" fill="transparent"/>
  <text x="180" y="107" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#334155">LPU Online</text>
  <rect x="190" y="85" width="170" height="36" fill="#94a3b8" rx="4"/>
  <text x="366" y="108" text-anchor="start" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#334155" dx="6">₹1,22,400</text>
  <text x="366" y="120" text-anchor="start" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" dx="6">20% grant applied</text>

  <!-- Row 2: CU ₹1,31,250 → (131250-80000)/120000*480 = 205 → highlighted orange -->
  <text x="180" y="157" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#f97316">CU Online</text>
  <rect x="190" y="135" width="205" height="36" fill="#f97316" rx="4"/>
  <text x="401" y="158" text-anchor="start" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#0f172a" dx="6">₹1,31,250</text>
  <text x="401" y="170" text-anchor="start" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" dx="6">25% Early Bird · NIRF #28</text>
  <!-- "Best NIRF" badge -->
  <rect x="190" y="131" width="72" height="16" fill="#0f172a" rx="3"/>
  <text x="226" y="143" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#f97316">NIRF #28 ★</text>

  <!-- Row 3: MUJ ₹1,39,500 → (139500-80000)/120000*480 = 238 -->
  <text x="180" y="207" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#334155">MUJ Online</text>
  <rect x="190" y="185" width="238" height="36" fill="#94a3b8" rx="4"/>
  <text x="434" y="208" text-anchor="start" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#334155" dx="6">₹1,39,500</text>
  <text x="434" y="220" text-anchor="start" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" dx="6">Inclusive of taxes</text>

  <!-- Row 4: Amity ₹1,75,120 → (175120-80000)/120000*480 = 380.5 -->
  <text x="180" y="257" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#334155">Amity Online</text>
  <rect x="190" y="235" width="381" height="36" fill="#cbd5e1" rx="4"/>
  <text x="577" y="258" text-anchor="start" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#334155" dx="6">₹1,75,120</text>
  <text x="577" y="270" text-anchor="start" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" dx="6">One-time</text>

  <!-- Footer note -->
  <text x="360" y="328" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">Source: Official university portals, May 2026. Verify fees at edifyedu.in before paying.</text>
</svg>
