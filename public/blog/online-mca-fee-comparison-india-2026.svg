<svg viewBox="0 0 660 420" xmlns="http://www.w3.org/2000/svg" width="660" height="420" role="img" aria-label="Online MCA fee comparison India 2026 across top UGC-DEB approved universities">
  <defs>
    <linearGradient id="mca-navy" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <style>
      .h { font: 700 18px system-ui, -apple-system, Segoe UI, Roboto, sans-serif; fill: #ffffff; }
      .sub { font: 400 12px system-ui, sans-serif; fill: #cbd5e1; }
      .uni { font: 700 14px system-ui, sans-serif; fill: #0f172a; }
      .fee { font: 700 16px system-ui, sans-serif; fill: #f97316; }
      .meta { font: 500 11px system-ui, sans-serif; fill: #475569; }
      .hdr { font: 700 11px system-ui, sans-serif; fill: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
      .bar-label { font: 600 10px system-ui, sans-serif; fill: #ffffff; }
    </style>
  </defs>
  <rect width="660" height="420" fill="#f8fafc"/>
  <rect width="660" height="74" fill="url(#mca-navy)"/>
  <text x="24" y="32" class="h">Online MCA Total Fee Comparison 2026</text>
  <text x="24" y="54" class="sub">Top UGC-DEB approved universities, 2-year programme, paid across 4 semesters.</text>

  <!-- bar chart -->
  <g transform="translate(180, 92)">
    <!-- Manipal Jaipur -->
    <text x="-12" y="20" text-anchor="end" class="uni">Manipal Jaipur</text>
    <rect x="0" y="6" width="170" height="22" rx="4" fill="#f97316"/>
    <text x="160" y="22" text-anchor="end" class="bar-label">Rs 1,55,000</text>
    <text x="-12" y="38" text-anchor="end" class="meta">NAAC A+ / 12 specs</text>

    <!-- Amity -->
    <text x="-12" y="74" text-anchor="end" class="uni">Amity Online</text>
    <rect x="0" y="60" width="190" height="22" rx="4" fill="#f97316"/>
    <text x="180" y="76" text-anchor="end" class="bar-label">Rs 1,71,800</text>
    <text x="-12" y="92" text-anchor="end" class="meta">NAAC A+ / Cloud, AI</text>

    <!-- LPU -->
    <text x="-12" y="128" text-anchor="end" class="uni">LPU Online</text>
    <rect x="0" y="114" width="150" height="22" rx="4" fill="#10b981"/>
    <text x="140" y="130" text-anchor="end" class="bar-label">Rs 1,42,000</text>
    <text x="-12" y="146" text-anchor="end" class="meta">NAAC A+ / 4 elective tracks</text>

    <!-- Chandigarh -->
    <text x="-12" y="182" text-anchor="end" class="uni">Chandigarh Online</text>
    <rect x="0" y="168" width="135" height="22" rx="4" fill="#10b981"/>
    <text x="125" y="184" text-anchor="end" class="bar-label">Rs 1,25,000</text>
    <text x="-12" y="200" text-anchor="end" class="meta">NAAC A+ / Industry projects</text>

    <!-- Jain -->
    <text x="-12" y="236" text-anchor="end" class="uni">JAIN Online</text>
    <rect x="0" y="222" width="140" height="22" rx="4" fill="#10b981"/>
    <text x="130" y="238" text-anchor="end" class="bar-label">Rs 1,30,000</text>
    <text x="-12" y="254" text-anchor="end" class="meta">NAAC A++ / Best ROI</text>

    <!-- IGNOU -->
    <text x="-12" y="290" text-anchor="end" class="uni">IGNOU</text>
    <rect x="0" y="276" width="64" height="22" rx="4" fill="#16a34a"/>
    <text x="54" y="292" text-anchor="end" class="bar-label">Rs 54,000</text>
    <text x="-12" y="308" text-anchor="end" class="meta">NAAC A++ / Most affordable</text>
  </g>

  <text x="330" y="408" text-anchor="middle" class="meta">Data sourced from official university portals. Indicative fees. Verify before payment.</text>
</svg>
