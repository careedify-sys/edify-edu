<line x1="24" y1="566" x2="964" y2="566" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="598.5" class="td" fill="#444444">Best for</text>
<line x1="234" y1="570" x2="234" y2="618" stroke="#C8DDD0" stroke-width="1"/>
