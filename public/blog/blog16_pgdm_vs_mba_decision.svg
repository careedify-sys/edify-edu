<line x1="24" y1="110" x2="964" y2="110" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="133.5" class="td" fill="#444444">Top corporate job — consulting, investment</text>
<text x="38" y="151.5" class="td" fill="#444444">banking, FMCG</text>
<line x1="384" y1="114" x2="384" y2="162" stroke="#C8DDD0" stroke-width="1"/>
<text x="398" y="142.5" class="td" fill="#444444">PGDM from IIM/ISB/XLRI if you can get in; otherwise top MBA</text>
<rect x="24" y="166" width="940" height="44" fill="#F4FAF6"/>
<line x1="24" y1="166" x2="964" y2="166" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="192.5" class="td" fill="#444444">Government job that requires MBA degree</text>
<line x1="384" y1="170" x2="384" y2="206" stroke="#C8DDD0" stroke-width="1"/>
<text x="398" y="192.5" class="td" fill="#444444">MBA from UGC-recognized university</text>
<rect x="24" y="210" width="940" height="44" fill="#FFFFFF"/>
<line x1="24" y1="210" x2="964" y2="210" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="236.5" class="td" fill="#444444">Academic/teaching career</text>
<line x1="384" y1="214" x2="384" y2="250" stroke="#C8DDD0" stroke-width="1"/>
<text x="398" y="236.5" class="td" fill="#444444">MBA from UGC-recognized university (needed for professor eligibility)</text>
<rect x="24" y="254" width="940" height="56" fill="#F4FAF6"/>
<line x1="24" y1="254" x2="964" y2="254" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="286.5" class="td" fill="#444444">Low-budget management education</text>
<line x1="384" y1="258" x2="384" y2="306" stroke="#C8DDD0" stroke-width="1"/>
<text x="398" y="277.5" class="td" fill="#444444">MBA from FMS Delhi, JBIMS Mumbai, or government MBA college (Rs. 10,000–2</text>
<text x="398" y="295.5" class="td" fill="#444444">lakh total fees)</text>
<rect x="24" y="310" width="940" height="44" fill="#FFFFFF"/>
<line x1="24" y1="310" x2="964" y2="310" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="336.5" class="td" fill="#444444">PhD after management studies</text>
<line x1="384" y1="314" x2="384" y2="350" stroke="#C8DDD0" stroke-width="1"/>
<text x="398" y="336.5" class="td" fill="#444444">MBA degree (PGDM may not meet eligibility at some institutions)</text>
<rect x="24" y="354" width="940" height="44" fill="#F4FAF6"/>
<line x1="24" y1="354" x2="964" y2="354" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="380.5" class="td" fill="#444444">International career or global employers</text>
<line x1="384" y1="358" x2="384" y2="394" stroke="#C8DDD0" stroke-width="1"/>
<text x="398" y="380.5" class="td" fill="#444444">PGDM from institute with AACSB/EQUIS accreditation</text>
