<rect x="24" y="66" width="940" height="44" fill="#1A6B2B"/>
<text x="38" y="92.5" class="th" fill="#FFFFFF">If your goal is...</text>
<line x1="384" y1="70" x2="384" y2="106" stroke="#FFFFFF44" stroke-width="1"/>
<text x="398" y="92.5" class="th" fill="#FFFFFF">Choose</text>
