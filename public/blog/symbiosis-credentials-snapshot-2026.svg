<svg viewBox="0 0 660 320" xmlns="http://www.w3.org/2000/svg" width="660" height="320" role="img" aria-label="Symbiosis SSODL Pune Online credentials snapshot 2026: NIRF Management rank 11, NIRF University rank 24, NAAC A++, UGC-DEB approved, AICTE approved, WES recognised, located in Pune Maharashtra.">
  <defs>
    <linearGradient id="sym-navy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1D35"/>
      <stop offset="100%" stop-color="#142540"/>
    </linearGradient>
    <linearGradient id="sym-amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9922a"/>
      <stop offset="100%" stop-color="#e0a93a"/>
    </linearGradient>
    <style>
      .h { font: 700 18px system-ui, -apple-system, Segoe UI, Roboto, sans-serif; fill: #ffffff; }
      .sub { font: 400 12px system-ui, sans-serif; fill: #cbd5e1; }
      .num-mega { font: 800 36px system-ui, sans-serif; fill: #0B1D35; }
      .num-rank { font: 800 28px system-ui, sans-serif; fill: #c9922a; }
      .lbl { font: 700 10px system-ui, sans-serif; fill: #64748b; text-transform: uppercase; letter-spacing: 0.08em; }
      .meta { font: 500 12px system-ui, sans-serif; fill: #475569; }
      .pill { font: 700 11px system-ui, sans-serif; fill: #ffffff; }
      .badge-text { font: 700 13px system-ui, sans-serif; fill: #0B1D35; }
    </style>
  </defs>

  <rect width="660" height="320" fill="#f8fafc"/>
  <rect width="660" height="74" fill="url(#sym-navy)"/>
  <text x="24" y="32" class="h">Symbiosis SSODL Pune Online: Credentials Snapshot 2026</text>
  <text x="24" y="54" class="sub">Symbiosis School for Online and Digital Learning, ranked among India's top management institutes.</text>

  <!-- Top 3 credentials cards -->
  <g transform="translate(24, 96)">
    <!-- NIRF Management Rank -->
    <rect x="0" y="0" width="195" height="110" rx="12" fill="#ffffff" stroke="#c9922a" stroke-width="1.5"/>
    <rect x="0" y="0" width="195" height="22" rx="12" fill="url(#sym-amber)"/>
    <text x="97" y="16" text-anchor="middle" class="pill" style="fill:#0B1D35;">NIRF MANAGEMENT 2025</text>
    <text x="97" y="68" text-anchor="middle" class="num-rank" style="font-size:44px;">#11</text>
    <text x="97" y="92" text-anchor="middle" class="meta">India's Top 15 B-Schools</text>

    <!-- NAAC Grade -->
    <rect x="207" y="0" width="195" height="110" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
    <rect x="207" y="0" width="195" height="22" rx="12" fill="#16a34a"/>
    <text x="304" y="16" text-anchor="middle" class="pill">NAAC ACCREDITATION</text>
    <text x="304" y="68" text-anchor="middle" class="num-mega" style="font-size:44px; fill:#16a34a;">A++</text>
    <text x="304" y="92" text-anchor="middle" class="meta">Highest possible grade</text>

    <!-- NIRF University Rank -->
    <rect x="414" y="0" width="195" height="110" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="414" y="0" width="195" height="22" rx="12" fill="#0B1D35"/>
    <text x="511" y="16" text-anchor="middle" class="pill">NIRF UNIVERSITY 2025</text>
    <text x="511" y="68" text-anchor="middle" class="num-rank" style="fill:#0B1D35; font-size:44px;">#24</text>
    <text x="511" y="92" text-anchor="middle" class="meta">Among 200+ ranked unis</text>
  </g>

  <!-- Approvals strip -->
  <g transform="translate(24, 222)">
    <text x="0" y="0" class="lbl">Approvals &amp; Recognitions</text>

    <g transform="translate(0, 14)">
      <rect x="0" y="0" width="118" height="32" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="59" y="20" text-anchor="middle" class="badge-text">UGC-DEB</text>

      <rect x="126" y="0" width="118" height="32" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="185" y="20" text-anchor="middle" class="badge-text">AICTE</text>

      <rect x="252" y="0" width="118" height="32" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="311" y="20" text-anchor="middle" class="badge-text">WES Recognised</text>

      <rect x="378" y="0" width="118" height="32" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="437" y="20" text-anchor="middle" class="badge-text">Govt Job Valid</text>

      <rect x="504" y="0" width="105" height="32" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="556" y="20" text-anchor="middle" class="badge-text">Pune, MH</text>
    </g>
  </g>

  <text x="330" y="304" text-anchor="middle" class="meta">Source: edifyedu.in live university record. NIRF 2025 release.</text>
</svg>
