<svg xmlns="http://www.w3.org/2000/svg" width="988" height="574" viewBox="0 0 988 574" role="img" aria-label="Blog 3: CAT exam pattern overview">
<style>
  text { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .th  { font-size: 13px; font-weight: 700; fill: #FFFFFF; }
  .td  { font-size: 12px; fill: #444444; }
  .ttl { font-size: 15px; font-weight: 700; fill: #111111; }
</style>
<rect width="988" height="574" rx="12" fill="#FFFFFF"/>
<rect x="22" y="64" width="944" height="488" rx="11" fill="#C8DDD0"/>
<text x="24" y="50" class="ttl">Blog 3: CAT exam pattern overview</text>
<rect x="24" y="66" width="940" height="44" fill="#1A6B2B"/>
<text x="38" y="92.5" class="th" fill="#FFFFFF">Parameter</text>
<line x1="285" y1="70" x2="285" y2="106" stroke="#FFFFFF44" stroke-width="1"/>
<text x="299" y="92.5" class="th" fill="#FFFFFF">Details</text>
<rect x="24" y="110" width="940" height="44" fill="#FFFFFF"/>
<line x1="24" y1="110" x2="964" y2="110" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="136.5" class="td" fill="#444444">Total questions</text>
<line x1="285" y1="114" x2="285" y2="150" stroke="#C8DDD0" stroke-width="1"/>
<text x="299" y="136.5" class="td" fill="#444444">68 (approximately)</text>
<rect x="24" y="154" width="940" height="44" fill="#F4FAF6"/>
<line x1="24" y1="154" x2="964" y2="154" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="180.5" class="td" fill="#444444">Total marks</text>
<line x1="285" y1="158" x2="285" y2="194" stroke="#C8DDD0" stroke-width="1"/>
<text x="299" y="180.5" class="td" fill="#444444">204 (3 marks per question)</text>
<rect x="24" y="198" width="940" height="44" fill="#FFFFFF"/>
<line x1="24" y1="198" x2="964" y2="198" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="224.5" class="td" fill="#444444">Duration</text>
<line x1="285" y1="202" x2="285" y2="238" stroke="#C8DDD0" stroke-width="1"/>
<text x="299" y="224.5" class="td" fill="#444444">120 minutes — 40 minutes per section</text>
<rect x="24" y="242" width="940" height="44" fill="#F4FAF6"/>
<line x1="24" y1="242" x2="964" y2="242" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="268.5" class="td" fill="#444444">Sections</text>
<line x1="285" y1="246" x2="285" y2="282" stroke="#C8DDD0" stroke-width="1"/>
<text x="299" y="268.5" class="td" fill="#444444">3: VARC, DILR, QA (in that fixed order)</text>
<rect x="24" y="286" width="940" height="44" fill="#FFFFFF"/>
<line x1="24" y1="286" x2="964" y2="286" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="312.5" class="td" fill="#444444">Question types</text>
<line x1="285" y1="290" x2="285" y2="326" stroke="#C8DDD0" stroke-width="1"/>
<text x="299" y="312.5" class="td" fill="#444444">MCQ (multiple choice) and TITA (Type In The Answer)</text>
<rect x="24" y="330" width="940" height="44" fill="#F4FAF6"/>
<line x1="24" y1="330" x2="964" y2="330" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="356.5" class="td" fill="#444444">Marking — correct</text>
<line x1="285" y1="334" x2="285" y2="370" stroke="#C8DDD0" stroke-width="1"/>
<text x="299" y="356.5" class="td" fill="#444444">+3 for every correct answer</text>
<rect x="24" y="374" width="940" height="44" fill="#FFFFFF"/>
<line x1="24" y1="374" x2="964" y2="374" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="400.5" class="td" fill="#444444">Marking — wrong MCQ</text>
<line x1="285" y1="378" x2="285" y2="414" stroke="#C8DDD0" stroke-width="1"/>
<text x="299" y="400.5" class="td" fill="#444444">-1 per incorrect MCQ</text>
<rect x="24" y="418" width="940" height="44" fill="#F4FAF6"/>
<line x1="24" y1="418" x2="964" y2="418" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="444.5" class="td" fill="#444444">Marking — wrong TITA</text>
<line x1="285" y1="422" x2="285" y2="458" stroke="#C8DDD0" stroke-width="1"/>
<text x="299" y="444.5" class="td" fill="#444444">0 — no negative marking</text>
<rect x="24" y="462" width="940" height="44" fill="#FFFFFF"/>
<line x1="24" y1="462" x2="964" y2="462" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="488.5" class="td" fill="#444444">Marking — skipped</text>
<line x1="285" y1="466" x2="285" y2="502" stroke="#C8DDD0" stroke-width="1"/>
<text x="299" y="488.5" class="td" fill="#444444">0</text>
<rect x="24" y="506" width="940" height="44" fill="#F4FAF6"/>
<line x1="24" y1="506" x2="964" y2="506" stroke="#C8DDD0" stroke-width="1"/>
<text x="38" y="532.5" class="td" fill="#444444">Eligibility</text>
<line x1="285" y1="510" x2="285" y2="546" stroke="#C8DDD0" stroke-width="1"/>
<text x="299" y="532.5" class="td" fill="#444444">Bachelor&#39;s degree with 50% marks (45% for SC/ST/PwD)</text>
<rect x="24" y="66" width="940" height="484" rx="10" fill="none" stroke="#C8DDD0" stroke-width="1.5"/>
</svg>